<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in - Ebur</title>
    <link rel="stylesheet" href="css/bootstrap.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="form-body">
    <!-- Form -->
    <div class="form">
      <form action="" class="form-login bg-dark">
        <a href="index.html" class="display-4 back">Ebur</a>
        <button type="submit" class="btn btn-outline-light btn-login form-control" onclick="alert('Link blom dibuat');">Sign in with google</button><br />
        <p class="lead text-center">OR</p>
        <div class="form-floating mb-3">
          <input type="email" class="form-control bg-dark" id="floatingInput" />
          <label for="floatingInput">Email address</label>
        </div>
        <div class="form-floating">
          <input type="password" class="form-control bg-dark" id="floatingPassword" />
          <label for="floatingPassword">Password</label>
        </div>
        <a href="#" onclick="alert('Link blom dibuat');">Forgot your password?</a><br />
        <button type="submit" class="btn btn-danger btn-login form-control">Log in</button>
        <div class="link-reg">
          <a href="#" onclick="alert('Link blom dibuat');">Don't have an account? Sign up now</a>
        </div>
      </form>
    </div>
    <script src="js/bootstrap.js"></script>
  </body>
</html>
